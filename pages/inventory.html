<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Inventory — Luck Keys | Looklist</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600;700&family=DM+Sans:wght@300;400;500&family=Cinzel:wght@400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./css/global.css">
  <style>
    body { background: #0a0a0a; }

    .inv-topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 36px;
      flex-wrap: wrap;
      gap: 16px;
    }

    .inv-stats {
      display: flex;
      gap: 24px;
    }

    .inv-stat {
      text-align: center;
      padding: 16px 24px;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 2px;
      min-width: 100px;
    }

    .inv-stat-val {
      font-family: 'Cormorant Garamond', serif;
      font-size: 28px;
      font-weight: 600;
      color: var(--gold);
    }

    .inv-stat-label {
      font-size: 11px;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-top: 2px;
    }

    .inv-filters {
      display: flex;
      gap: 8px;
      margin-bottom: 28px;
      flex-wrap: wrap;
    }

    .filter-btn {
      padding: 8px 18px;
      border-radius: 2px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--text-dim);
      font-family: 'DM Sans', sans-serif;
      font-size: 12px;
      cursor: pointer;
      transition: all 0.2s;
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }

    .filter-btn:hover { border-color: var(--border-hover); color: var(--text); }
    .filter-btn.active { background: rgba(201,169,110,0.1); border-color: rgba(201,169,110,0.4); color: var(--gold); }
    .filter-btn.f-silver.active { background: rgba(184,200,216,0.1); border-color: rgba(184,200,216,0.4); color: var(--silver); }
    .filter-btn.f-gold.active { background: rgba(201,169,110,0.1); border-color: rgba(201,169,110,0.4); color: var(--gold); }
    .filter-btn.f-diamond.active { background: rgba(126,232,250,0.1); border-color: rgba(126,232,250,0.4); color: var(--diamond); }

    .inv-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 16px;
      margin-bottom: 48px;
    }

    .inv-item {
      background: var(--bg-card);
      border-radius: 3px;
      padding: 0;
      position: relative;
      overflow: hidden;
      transition: all 0.25s;
      cursor: pointer;
    }

    .inv-item:hover { transform: translateY(-3px); }
    .inv-item.r-common { border: 1px solid rgba(138,155,181,0.2); }
    .inv-item.r-silver { border: 1px solid rgba(184,200,216,0.35); }
    .inv-item.r-gold { border: 1px solid rgba(201,169,110,0.4); }
    .inv-item.r-diamond { border: 1px solid rgba(126,232,250,0.5); box-shadow: 0 0 24px rgba(126,232,250,0.08); }

    .inv-item:hover.r-common { border-color: rgba(138,155,181,0.4); }
    .inv-item:hover.r-silver { border-color: rgba(184,200,216,0.6); }
    .inv-item:hover.r-gold { border-color: rgba(201,169,110,0.7); }
    .inv-item:hover.r-diamond { border-color: rgba(126,232,250,0.8); }

    .inv-item-visual {
      height: 140px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 56px;
      position: relative;
    }

    .inv-item.r-silver .inv-item-visual { background: radial-gradient(ellipse, rgba(184,200,216,0.06) 0%, transparent 70%); }
    .inv-item.r-gold .inv-item-visual { background: radial-gradient(ellipse, rgba(201,169,110,0.08) 0%, transparent 70%); }
    .inv-item.r-diamond .inv-item-visual { background: radial-gradient(ellipse, rgba(126,232,250,0.08) 0%, transparent 70%); }

    .inv-item-body { padding: 14px; }

    .inv-item-name {
      font-family: 'Cormorant Garamond', serif;
      font-size: 15px;
      font-weight: 600;
      color: var(--text);
      margin-bottom: 6px;
      line-height: 1.3;
    }

    .inv-item-meta {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .inv-item-val { font-size: 12px; color: var(--text-muted); }

    /* Inspect modal */
    .inspect-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.88);
      z-index: 200;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s;
      backdrop-filter: blur(12px);
    }

    .inspect-overlay.visible { opacity: 1; pointer-events: all; }

    .inspect-modal {
      width: 500px;
      max-width: 96vw;
      background: #0e0e0e;
      border-radius: 4px;
      overflow: hidden;
      transform: scale(0.94) translateY(10px);
      transition: all 0.35s cubic-bezier(0.16, 1, 0.3, 1);
    }

    .inspect-overlay.visible .inspect-modal { transform: scale(1) translateY(0); }

    .inspect-visual {
      height: 220px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 100px;
      position: relative;
    }

    .inspect-modal.r-common .inspect-visual { background: rgba(138,155,181,0.06); border-bottom: 1px solid rgba(138,155,181,0.2); }
    .inspect-modal.r-silver .inspect-visual { background: rgba(184,200,216,0.06); border-bottom: 1px solid rgba(184,200,216,0.3); }
    .inspect-modal.r-gold .inspect-visual { background: rgba(201,169,110,0.06); border-bottom: 1px solid rgba(201,169,110,0.35); }
    .inspect-modal.r-diamond .inspect-visual { background: rgba(126,232,250,0.05); border-bottom: 1px solid rgba(126,232,250,0.4); }

    .inspect-body { padding: 32px; }

    .inspect-rarity {
      margin-bottom: 12px;
    }

    .inspect-name {
      font-family: 'Cormorant Garamond', serif;
      font-size: 30px;
      font-weight: 600;
      color: var(--text);
      margin-bottom: 4px;
    }

    .inspect-val {
      font-size: 13px;
      color: var(--text-muted);
      margin-bottom: 24px;
    }

    .inspect-date {
      font-size: 12px;
      color: var(--text-muted);
      padding-bottom: 24px;
      border-bottom: 1px solid var(--border);
      margin-bottom: 24px;
    }

    .inspect-actions {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .inspect-btn {
      padding: 14px 20px;
      border-radius: 2px;
      border: none;
      font-family: 'DM Sans', sans-serif;
      font-size: 13px;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 10px;
      transition: all 0.2s;
      text-align: left;
    }

    .inspect-btn.primary {
      background: linear-gradient(135deg, var(--gold), var(--gold-dark));
      color: #0a0a0a;
      font-weight: 600;
    }
    .inspect-btn.primary:hover { box-shadow: 0 4px 16px rgba(201,169,110,0.3); transform: translateY(-1px); }

    .inspect-btn.secondary {
      background: rgba(255,255,255,0.04);
      color: var(--text-dim);
      border: 1px solid var(--border);
    }
    .inspect-btn.secondary:hover { color: var(--text); border-color: var(--border-hover); background: rgba(255,255,255,0.07); }
    .inspect-btn.secondary[disabled] { opacity: 0.4; cursor: not-allowed; }

    .inspect-close {
      position: absolute;
      top: 16px; right: 16px;
      width: 32px; height: 32px;
      background: rgba(255,255,255,0.08);
      border: none;
      border-radius: 50%;
      color: var(--text-dim);
      font-size: 16px;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
    }
    .inspect-close:hover { background: rgba(255,255,255,0.14); color: var(--text); }

    /* Empty state */
    .empty-state {
      text-align: center;
      padding: 80px 40px;
      border: 1px dashed rgba(255,255,255,0.08);
      border-radius: 3px;
    }

    .empty-icon { font-size: 64px; margin-bottom: 20px; opacity: 0.3; }
    .empty-title {
      font-family: 'Cormorant Garamond', serif;
      font-size: 28px;
      font-weight: 600;
      color: var(--text);
      margin-bottom: 10px;
    }
    .empty-desc { font-size: 14px; color: var(--text-dim); margin-bottom: 28px; }
  </style>
</head>
<body>
  <script src="./js/shared.js"></script>
  <script>requireAuth(); buildNavbar('inventory');</script>

  <div class="page-wrap">
    <div class="section-header" style="margin-bottom:24px;">
      <div class="section-eyebrow">Your Collection</div>
      <h1 class="section-title">Inventory</h1>
    </div>

    <!-- Stats + controls -->
    <div class="inv-topbar">
      <div class="inv-stats">
        <div class="inv-stat">
          <div class="inv-stat-val" id="stat-total">0</div>
          <div class="inv-stat-label">Total Items</div>
        </div>
        <div class="inv-stat">
          <div class="inv-stat-val" id="stat-val">£0.00</div>
          <div class="inv-stat-label">Est. Value</div>
        </div>
        <div class="inv-stat">
          <div class="inv-stat-val" id="stat-gold">0</div>
          <div class="inv-stat-label">Gold+</div>
        </div>
      </div>
      <a href="open.html" class="btn btn-gold">🗝️ Open More Boxes</a>
    </div>

    <!-- Filters -->
    <div class="inv-filters">
      <button class="filter-btn active" onclick="setFilter('all', this)">All</button>
      <button class="filter-btn" onclick="setFilter('common', this)">Common</button>
      <button class="filter-btn f-silver" onclick="setFilter('silver', this)">Silver</button>
      <button class="filter-btn f-gold" onclick="setFilter('gold', this)">Gold</button>
      <button class="filter-btn f-diamond" onclick="setFilter('diamond', this)">Diamond</button>
    </div>

    <!-- Grid -->
    <div class="inv-grid" id="invGrid"></div>
  </div>

  <!-- Inspect modal -->
  <div class="inspect-overlay" id="inspectOverlay">
    <div class="inspect-modal" id="inspectModal" style="position:relative;">
      <button class="inspect-close" onclick="closeInspect()">✕</button>
      <div class="inspect-visual" id="inspectVisual"></div>
      <div class="inspect-body">
        <div class="inspect-rarity" id="inspectRarity"></div>
        <div class="inspect-name" id="inspectName"></div>
        <div class="inspect-val" id="inspectVal"></div>
        <div class="inspect-date" id="inspectDate"></div>
        <div class="inspect-actions">
          <button class="inspect-btn primary" onclick="orderHome()">📦 Order Home <span style="font-size:11px;opacity:0.6;margin-left:auto;">Coming Soon</span></button>
          <button class="inspect-btn secondary" onclick="sendMarketplace()">🏪 Send to Marketplace <span style="font-size:11px;opacity:0.6;margin-left:auto;">Coming Soon</span></button>
          <button class="inspect-btn secondary" onclick="closeInspect()">← Back to Inventory</button>
        </div>
      </div>
    </div>
  </div>

  <script>
    let activeFilter = 'all';
    let inspectItem = null;

    function setFilter(rarity, btn) {
      activeFilter = rarity;
      document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      renderGrid();
    }

    function renderGrid() {
      const inv = State.inventory;
      const grid = document.getElementById('invGrid');

      // Stats
      document.getElementById('stat-total').textContent = inv.length;
      const totalVal = inv.reduce((s, i) => s + (i.value || 0), 0);
      document.getElementById('stat-val').textContent = '£' + totalVal.toFixed(2);
      const goldPlus = inv.filter(i => i.rarity === 'gold' || i.rarity === 'diamond').length;
      document.getElementById('stat-gold').textContent = goldPlus;

      const filtered = activeFilter === 'all' ? inv : inv.filter(i => i.rarity === activeFilter);
      grid.innerHTML = '';

      if (filtered.length === 0) {
        const empty = document.createElement('div');
        empty.className = 'empty-state';
        empty.style.gridColumn = '1 / -1';
        if (inv.length === 0) {
          empty.innerHTML = `
            <div class="empty-icon">📦</div>
            <div class="empty-title">Vault is empty</div>
            <div class="empty-desc">Open some boxes to start building your collection.</div>
            <a href="open.html" class="btn btn-gold">Open Your First Box →</a>
          `;
        } else {
          empty.innerHTML = `
            <div class="empty-icon">🔍</div>
            <div class="empty-title">No ${activeFilter} items yet</div>
            <div class="empty-desc">Keep opening boxes to find higher rarities.</div>
          `;
        }
        grid.appendChild(empty);
        return;
      }

      filtered.forEach((item, i) => {
        const el = document.createElement('div');
        el.className = `inv-item r-${item.rarity}`;
        el.style.animationDelay = `${i * 0.04}s`;
        el.innerHTML = `
          <div class="inv-item-visual">${item.emoji || '💎'}</div>
          <div class="inv-item-body">
            <div class="inv-item-name">${item.name}</div>
            <div class="inv-item-meta">
              <span class="rarity-badge ${getRarityClass(item.rarity)}">${item.rarity}</span>
              <span class="inv-item-val">£${item.value.toFixed(2)}</span>
            </div>
          </div>
        `;
        el.onclick = () => openInspect(item);
        grid.appendChild(el);
      });
    }

    function openInspect(item) {
      inspectItem = item;
      const modal = document.getElementById('inspectModal');
      modal.className = `inspect-modal r-${item.rarity}`;
      document.getElementById('inspectVisual').textContent = item.emoji || '💎';
      document.getElementById('inspectRarity').innerHTML = `<span class="rarity-badge ${getRarityClass(item.rarity)}">${item.rarity}</span>`;
      document.getElementById('inspectName').textContent = item.name;
      document.getElementById('inspectVal').textContent = `Estimated value: £${item.value.toFixed(2)}`;
      const date = item.acquired ? new Date(item.acquired).toLocaleDateString('en-GB', { dateStyle: 'medium' }) : 'Unknown';
      document.getElementById('inspectDate').textContent = `Acquired: ${date}`;
      document.getElementById('inspectOverlay').classList.add('visible');
    }

    function closeInspect() {
      document.getElementById('inspectOverlay').classList.remove('visible');
    }

    function orderHome() {
      showToast('📦 Order Home — coming soon in the full release.', 'gold-toast');
    }

    function sendMarketplace() {
      showToast('🏪 Marketplace listing — coming soon in the full release.', 'gold-toast');
    }

    // Close on backdrop click
    document.getElementById('inspectOverlay').addEventListener('click', function(e) {
      if (e.target === this) closeInspect();
    });

    renderGrid();
  </script>

<script>
(function () {
  var redirect = sessionStorage.redirect;
  delete sessionStorage.redirect;
  if (redirect && redirect !== location.href) {
    history.replaceState(null, null, redirect);
  }
})();
</script>

</body>
</html>
